# Docker configuration
version: '3.9'

services:
  bookswap:
    build: .
    ports:
      - "5000:8080"
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=bookswapdb;Username=postgres;Password=postgres

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bookswapdb
    ports:
      - "5432:5432"